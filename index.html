<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
<style>
        /* 1. CORE LAYOUT & CANVAS */
        body { 
            margin: 0; 
            padding: 0; 
            background: #050505; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; }

        /* 2. PLANET LABELS (Floating in 3D) */
        .planet-label {
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            pointer-events: auto;
            transition: background 0.2s, border-color 0.2s;
        }
        .planet-label:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: #ffffff;
        }

        /* 3. MAIN TIME CONTROLS CONTAINER */
        #time-controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #444;
            color: white;
            z-index: 10002;
            min-width: 400px;
        }

        /* 4. TIME ROWS & INPUT CENTERING */
        .time-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #current-date {
            background: transparent !important;
            border: none !important;
            color: #00d4ff !important;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            width: 100%;
            cursor: text;
            font-family: inherit;
        }

        /* 5. BUTTONS & SLIDER */
        .controls-row { gap: 20px; }
        
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background: #222;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            text-transform: uppercase;
        }
        button:hover { 
            background: #333; 
            border-color: #00d4ff; 
        }

        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }

        /* Distance Label Styling */
        .distance-label {
            pointer-events: none;
            z-index: 1000;
        }
        #speed-readout {
            display: inline-block;
            width: 70px;
            text-align: left;
            margin-left: 5px;
            font-variant-numeric: tabular-nums; /* Keeps numbers from jumping */
        }

        .controls-hint {
            position: fixed;
            /* Calculated: Container bottom is 30px + Container height is ~110px + gap 10px */
            bottom: 190px; 
            left: 50%;
            transform: translateX(-50%);
            
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap; /* Prevents text from wrapping on small screens */
            
            pointer-events: none;
            user-select: none;
            z-index: 10001; /* Just below the main container */
            
            /* Optional: Add a subtle glow to make it readable against stars */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.85);
        }
        .controls-hint2 {
            position: fixed;
            /* Calculated: Container bottom is 30px + Container height is ~110px + gap 10px */
            bottom: 170px; 
            left: 50%;
            transform: translateX(-50%);
            
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap; /* Prevents text from wrapping on small screens */
            
            pointer-events: none;
            user-select: none;
            z-index: 10001; /* Just below the main container */
            
            /* Optional: Add a subtle glow to make it readable against stars */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.85);
        }
        .controls-hint3 {
            font-size: 14px;
            color: rgba(0, 212, 255, 0.6); /* Faint cyan */
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding-bottom: 0px;
            margin-bottom: 0px;
            width: 100%;
            text-align: center;
            pointer-events: none; /* User can't accidentally highlight it */
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="controls-hint">
    </div>
    <div class="controls-hint2">
        Left click to select planet | Shift click to target another
    </div>
    <div id="time-controls-container">
    <input type="text" id="current-date" class="date-display" value="Loading Date...">
         <div class="controls-hint3">
            Click to edit date
        </div>
        <div class="time-row controls-row">
            <button id="reverse-btn" title="Reverse">◀◀</button>
            <button id="pause-btn" style="min-width: 80px; font-family: monospace;">Pause</button>
            <div class="slider-group">
                <span class="slider-label">Speed</span>
                <input type="range" id="speed-slider" min="0" max="2" step="0.01" value="0.3">
                <span id="speed-readout" style="min-width: 80px; font-size: 12px; color: #00d4ff;">0.3 d/s</span>
            </div>
        </div>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
